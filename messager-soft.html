<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Membres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .gradient-bg { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="gradient-bg flex items-center justify-center min-h-screen p-6 text-white">

    <div class="max-w-sm w-full bg-white/5 backdrop-blur-lg border border-white/10 rounded-3xl p-8 shadow-2xl text-center">
        <div class="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/20 text-indigo-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>

        <h1 class="text-2xl font-semibold mb-2 tracking-tight">Espace Privé</h1>
        <p class="text-slate-400 text-sm mb-8 leading-relaxed">
            Cette plateforme de rencontres est réservée à un public majeur. 
            Veuillez confirmer votre âge pour accéder à la carte des membres.
        </p>

        <div class="space-y-3">
            <button onclick="enter()" class="w-full btn-gradient hover:opacity-90 text-white font-semibold py-3.5 rounded-xl transition duration-300 shadow-lg shadow-indigo-500/20">
                J'ai plus de 18 ans
            </button>

            <button onclick="leave()" class="w-full bg-transparent hover:bg-white/5 text-slate-400 font-medium py-3 rounded-xl transition duration-300">
                Quitter
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">
                Vérification obligatoire
            </p>
        </div>
    </div>

    <script>
        function enter() {
            window.location.href = "https://mon-crush.fr/cd/map/";
        }
        function leave() {
            window.location.href = "https://www.google.com";
        }
    </script>

</body>
</html>
